services:
  ghost:
    image: ghost:latest
    restart: always
    ports:
      - "2368:2368"
    environment:
      NODE_ENV: production
      url: https://blog.{{DOMAIN}}                    # update to your domain
      database__client: mysql
      database__connection__host: db
      database__connection__user: ghost
      database__connection__password: {{GHOST_DB_PASSWORD}}
      database__connection__database: ghost
      mail__transport: SMTP
    volumes:
      - ./volumes/content:/var/lib/ghost/content
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: {{MYSQL_ROOT_PASSWORD}}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: {{GHOST_DB_PASSWORD}}
    volumes:
      - ./volumes/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ghost", "-p{{GHOST_DB_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 10

# Deploy:
#   mkdir -p /mnt/disks/data/ghost/volumes/{content,db}
#   cd /mnt/disks/data/ghost
#   cp this file to docker-compose.yml
#   fill in {{PLACEHOLDER}} values in .env or directly
#   docker compose up -d
#
# Verify:
#   curl -s http://localhost:2368/ghost/api/admin/site/
#   → should return JSON with title and version
#
# Then open https://blog.{{DOMAIN}}/ghost to complete admin setup
